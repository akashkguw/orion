strict_apples_to_apples: true
train_tokens_target: 4000000

runner:
  run_val_eval: true
  val_eval_batches: 40
  run_model_only_bench: true
  bench_warmup: 5
  bench_iters: 20
  eval_long_context_batch_size: 1
  disable_probe_metrics_for_apples_to_apples: true
  auto_retry_oom: false
  auto_retry_dense_cuda_fail: false
  overwrite: false
  log_every: 10
  save_every: final

analysis:
  val_ppl_tolerance: 0.20

seeds:
  - 123
  - 456

seq_lens:
  - 1024
  - 2048
  - 4096

lr_grid:
  - 0.0003

fixed_batch_by_seq:
  1024: 2
  2048: 1
  4096: 1

batch_candidates_by_seq:
  1024: [4, 3, 2, 1]
  2048: [2, 1]
  4096: [1]

variants:
  - id: dense
    config: configs/experiments/variants/dense.yaml
    backend: dense
    sparse_tag: dense
  - id: window_w64
    config: configs/experiments/variants/window_w64.yaml
    backend: window
    sparse_tag: w64
  - id: sparse_w64_d8_formula_default
    config: configs/experiments/variants/sparse_w64_d8_formula_default.yaml
    backend: sparse
    sparse_tag: w64_d8_a7_b13_c1_d3
  - id: sparse_w64_d8_formula_lowcross
    config: configs/experiments/variants/sparse_w64_d8_formula_lowcross.yaml
    backend: sparse
    sparse_tag: w64_d8_a5_b11_c1_d1
  - id: sparse_w64_d8_formula_highmix
    config: configs/experiments/variants/sparse_w64_d8_formula_highmix.yaml
    backend: sparse
    sparse_tag: w64_d8_a9_b17_c1_d5
  - id: sparse_w64_d8_formula_s2x2
    config: configs/experiments/variants/sparse_w64_d8_formula_s2x2.yaml
    backend: sparse
    sparse_tag: w64_d8_a7_b13_c2_d3
