strict_apples_to_apples: true
train_tokens_target: 2000000
runner:
  run_val_eval: true
  val_eval_batches: 24
  run_model_only_bench: true
  bench_warmup: 3
  bench_iters: 12
  eval_long_context_batch_size: 1
  disable_probe_metrics_for_apples_to_apples: true
  auto_retry_oom: false
  auto_retry_dense_cuda_fail: false
  overwrite: false
  log_every: 10
  save_every: final
analysis:
  val_ppl_tolerance: 0.2
seeds:
- 123
- 456
- 789
seq_lens:
- 256
- 512
- 1024
- 2048
- 4096
lr_grid:
- 0.0003
fixed_batch_by_seq:
  256: 8
  512: 4
  1024: 2
  2048: 1
  4096: 1
batch_candidates_by_seq:
  256:
  - 16
  - 12
  - 8
  - 4
  512:
  - 8
  - 6
  - 4
  - 2
  1024:
  - 4
  - 3
  - 2
  - 1
  2048:
  - 2
  - 1
  4096:
  - 1
variants:
- id: dense
  config: configs/experiments/variants/dense.yaml
  backend: dense
  sparse_tag: dense
- id: window_w64
  config: configs/experiments/variants/window_w64.yaml
  backend: window
  sparse_tag: w64
- id: sparse_w64_d8
  config: configs/experiments/variants/sparse_w64_d8.yaml
  backend: sparse
  sparse_tag: w64_d8
- id: sparse_w64_d16
  config: configs/experiments/variants/sparse_w64_d16.yaml
  backend: sparse
  sparse_tag: w64_d16
- id: sparse_w64_d32
  config: configs/experiments/variants/sparse_w64_d32.yaml
  backend: sparse
  sparse_tag: w64_d32
- id: sparse_w64_d64
  config: configs/experiments/variants/sparse_w64_d64.yaml
  backend: sparse
  sparse_tag: w64_d64
- id: sparse_w64_d128
  config: configs/experiments/variants/sparse_w64_d128.yaml
  backend: sparse
  sparse_tag: w64_d128
- id: sparse_w64_d256
  config: configs/experiments/variants/sparse_w64_d256.yaml
  backend: sparse
  sparse_tag: w64_d256
