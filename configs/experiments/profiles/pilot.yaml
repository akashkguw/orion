strict_apples_to_apples: true
train_tokens_target: 6000000

seeds:
  - 123
  - 456
  - 789

seq_lens:
  - 256
  - 512
  - 1024

lr_grid:
  - 0.0003
  - 0.0002

fixed_batch_by_seq:
  256: 8
  512: 4
  1024: 2
  2048: 1
  4096: 1

batch_candidates_by_seq:
  256: [16, 12, 8, 4]
  512: [8, 6, 4, 2]
  1024: [4, 3, 2, 1]

variants:
  - id: dense
    config: configs/experiments/variants/dense.yaml
    backend: dense
    sparse_tag: dense
  - id: window_w64
    config: configs/experiments/variants/window_w64.yaml
    backend: window
    sparse_tag: w64
  - id: window_w128
    config: configs/experiments/variants/window_w128.yaml
    backend: window
    sparse_tag: w128
  - id: sparse_w64_d8
    config: configs/experiments/variants/sparse_w64_d8.yaml
    backend: sparse
    sparse_tag: w64_d8
  - id: sparse_w128_d16
    config: configs/experiments/variants/sparse_w128_d16.yaml
    backend: sparse
    sparse_tag: w128_d16

