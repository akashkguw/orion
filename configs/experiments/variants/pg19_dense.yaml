run:
  out_dir: runs/exp_pg19_dense
  seed: 123
  steps: 100
  log_every: 10
  save_every: 100

data:
  dataset: pg19
  root: data
  seq_len: 2048
  batch_size: 8
  pg19_dataset_id: deepmind/pg19
  pg19_streaming: true
  pg19_train_docs: 8000
  pg19_val_docs: 1000

model:
  name: orion
  d_model: 256
  n_layers: 4
  n_heads: 4
  mlp_mult: 4

attention:
  backend: dense

optim:
  lr: 3e-4

