run:
  out_dir: runs/exp_shakespeare_sparse
  seed: 123
  steps: 2000
  log_every: 50
  save_every: 2000

data:
  dataset: tinyshakespeare
  root: data
  seq_len: 256
  batch_size: 16

model:
  name: orion
  d_model: 256
  n_layers: 4
  n_heads: 4
  mlp_mult: 4
  
attention:
  backend: sparse
  window_size: 64
  expander_degree: 16
  sparse_impl: flex
  sparse_block_size: 128
