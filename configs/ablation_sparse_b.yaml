run:
  out_dir: runs/ablation_sparse_b_BASE
  seed: 42
  steps: 300
  log_every: 50
  save_every: 300
data:
  dataset: tinyshakespeare
  root: data
  seq_len: 256
  batch_size: 8
model:
  name: orion
  d_model: 256
  n_layers: 4
  n_heads: 4
  mlp_mult: 4
attention:
  backend: sparse
  window_size: 64
  expander_degree: 16
  sparse_impl: gather
optim:
  lr: 3e-4
