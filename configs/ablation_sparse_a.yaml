run:
  out_dir: runs/ablation_sparse_a_BASE
  seed: 42
  steps: 300
  log_every: 50
  save_every: 300
data:
  dataset: tinyshakespeare
  root: data
  seq_len: 128
  batch_size: 8
model:
  name: orion
  d_model: 128
  n_layers: 2
  n_heads: 4
  mlp_mult: 4
attention:
  backend: sparse
  window_size: 32
  expander_degree: 8
  sparse_impl: flex
optim:
  lr: 3e-4
